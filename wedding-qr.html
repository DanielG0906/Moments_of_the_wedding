<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>קוד QR לחתונה</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<!-- QRCode.js from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --cream: #faf6f1;
    --rose: #c4896f;
    --gold: #c9a96e;
    --deep: #3a2820;
    --blush: #e8c5b0;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height: 100vh;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Jost', sans-serif;
    padding: 24px;
  }

  .card {
    background: #fff;
    border-radius: 28px;
    padding: 48px 40px 40px;
    max-width: 400px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 80px rgba(58,40,32,0.12), 0 4px 20px rgba(58,40,32,0.06);
    position: relative;
    overflow: hidden;
  }

  /* Botanical corner */
  .card::before {
    content: '❀';
    position: absolute;
    top: 16px; left: 20px;
    font-size: 1.4rem;
    color: var(--blush);
    opacity: 0.6;
  }
  .card::after {
    content: '❀';
    position: absolute;
    bottom: 16px; right: 20px;
    font-size: 1.4rem;
    color: var(--blush);
    opacity: 0.6;
    transform: rotate(180deg);
  }

  .eyebrow {
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--rose);
    margin-bottom: 10px;
  }
  .couple {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.4rem;
    font-weight: 300;
    font-style: italic;
    color: var(--deep);
    line-height: 1.1;
  }
  .couple .amp { color: var(--rose); }

  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 16px auto;
    max-width: 200px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--blush);
  }
  .divider span { color: var(--gold); font-size: 0.9rem; }

  .qr-frame {
    margin: 4px auto 20px;
    width: 220px; height: 220px;
    border-radius: 20px;
    background: white;
    padding: 16px;
    box-shadow: 0 4px 24px rgba(58,40,32,0.10);
    border: 2px solid var(--blush);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  /* Styled QR corners */
  .qr-frame::before, .qr-frame::after {
    content: '';
    position: absolute;
    width: 22px; height: 22px;
    border-color: var(--gold);
    border-style: solid;
  }
  .qr-frame::before { top:-1px; left:-1px; border-width:3px 0 0 3px; border-radius:6px 0 0 0; }
  .qr-frame::after  { bottom:-1px; right:-1px; border-width:0 3px 3px 0; border-radius:0 0 6px 0; }
  #qr-br, #qr-tr {
    position:absolute;
    width:22px; height:22px;
    border-color:var(--gold);
    border-style:solid;
  }
  #qr-br { bottom:-1px; left:-1px; border-width:0 0 3px 3px; border-radius:0 0 0 6px; }
  #qr-tr { top:-1px; right:-1px; border-width:3px 3px 0 0; border-radius:0 6px 0 0; }

  #qrcode { display:flex; align-items:center; justify-content:center; }
  #qrcode canvas, #qrcode img { border-radius:8px; }

  .cta {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem;
    font-style: italic;
    color: var(--deep);
    line-height: 1.5;
    margin-bottom: 6px;
  }
  .subcta {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--rose);
    margin-bottom: 20px;
  }

  .date-badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--rose), var(--gold));
    color: white;
    padding: 6px 20px;
    border-radius: 30px;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* URL override input */
  .url-section {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--blush);
  }
  .url-label {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--rose);
    margin-bottom: 8px;
    display: block;
  }
  .url-row {
    display: flex;
    gap: 8px;
  }
  .url-input {
    flex: 1;
    padding: 10px 14px;
    border: 1.5px solid var(--blush);
    border-radius: 10px;
    font-family: 'Jost', sans-serif;
    font-size: 0.8rem;
    color: var(--deep);
    outline: none;
  }
  .url-input:focus { border-color: var(--gold); }
  .url-btn {
    padding: 10px 16px;
    background: var(--deep);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'Jost', sans-serif;
    font-size: 0.75rem;
    cursor: pointer;
    white-space: nowrap;
  }

  @media print {
    body { background: white; }
    .url-section { display: none; }
    .card { box-shadow: none; border: 1px solid var(--blush); }
  }
</style>
</head>
<body>

<div class="card" id="card">
  <p class="eyebrow">מוזמנים לשתף איתנו</p>
  <div class="couple" id="coupleNames">טוען...</div>
  <div class="divider"><span>♡</span></div>

  <div class="qr-frame">
    <div id="qr-br"></div>
    <div id="qr-tr"></div>
    <div id="qrcode"></div>
  </div>

  <p class="cta">סרקו כדי לתעד רגעים<br>לאלבום המשותף שלנו</p>
  <p class="subcta">כוונו את המצלמה לקוד למעלה</p>
  <div class="date-badge" id="dateBadge">טוען תאריך...</div>
</div>

<script>
const GAS_URL   = 'https://script.google.com/macros/s/AKfycbwpYzRO0vSM8eqY8EVos4q9fF6pmVtLXhM6MGoqP3A7gppbq5JiQFsFLkmq8B5wKs_p/exec';
const eventId   = new URLSearchParams(window.location.search).get('eventID');
const APP_URL   = eventId
  ? `https://danielg0906.github.io/Moments_of_the_wedding/wedding-app.html?eventID=${eventId}`
  : 'https://danielg0906.github.io/Moments_of_the_wedding/wedding-app.html';

// ערכות עיצוב — אותן צבעים כמו wedding-app
const THEMES = {
  classic: { rose:'#c4896f', gold:'#c9a96e', deep:'#3a2820', blush:'#e8c5b0', cream:'#faf6f1' },
  boho:    { rose:'#c9956a', gold:'#b07840', deep:'#3d1f10', blush:'#e8c0a0', cream:'#f5ede0' },
  gold:    { rose:'#c9a96e', gold:'#e8c87a', deep:'#f0e0c0', blush:'rgba(201,169,110,0.4)', cream:'#1a1208' },
  floral:  { rose:'#c8899e', gold:'#d4a0b5', deep:'#4a1530', blush:'#f0c0d0', cream:'#fdf0f5' },
  minimal: { rose:'#888880', gold:'#a8a8a0', deep:'#2a2a28', blush:'#d8d8d4', cream:'#f8f8f6' },
};

function applyTheme(theme) {
  const t = THEMES[theme] || THEMES.classic;
  const r = document.documentElement;
  r.style.setProperty('--rose',  t.rose);
  r.style.setProperty('--gold',  t.gold);
  r.style.setProperty('--deep',  t.deep);
  r.style.setProperty('--blush', t.blush);
  r.style.setProperty('--cream', t.cream);
  // עדכן גם צבע כהה של ה-QR
  document.body.style.background = t.cream;
}

// טעינת נתוני אירוע מ-GAS
async function loadEvent() {
  if (!eventId) {
    // אין eventID — הצג ברירת מחדל
    document.getElementById('coupleNames').innerHTML = 'שם הכלה <span class="amp">&</span> שם החתן';
    document.getElementById('dateBadge').textContent = 'תאריך החתונה · היום מתחיל הנצח';
    generateQR(APP_URL);
    return;
  }
  try {
    const res  = await fetch(`${GAS_URL}?action=event&eventID=${eventId}`);
    const data = await res.json();
    if (data.found) {
      const { brideName, groomName, weddingDate, theme } = data.event;
      // עדכן שמות
      document.getElementById('coupleNames').innerHTML =
        `${brideName} <span class="amp">&</span> ${groomName}`;
      // עדכן תאריך
      if (weddingDate) {
        const d = new Date(weddingDate + 'T00:00:00');
        const formatted = d.toLocaleDateString('he-IL',{day:'numeric',month:'long',year:'numeric'});
        document.getElementById('dateBadge').textContent = `${formatted} · היום מתחיל הנצח`;
      }
      // עדכן עיצוב
      if (theme) applyTheme(theme);
    }
  } catch(e) {
    // fallback — אין חיבור
    document.getElementById('coupleNames').innerHTML = 'קרן <span class="amp">&</span> דניאל';
    document.getElementById('dateBadge').textContent = '26 באוקטובר 2026 · היום מתחיל הנצח';
  }
  generateQR(APP_URL);
}

function generateQR(url) {
  const container = document.getElementById('qrcode');
  container.innerHTML = '';

  // Generate QR into a temp div first
  const temp = document.createElement('div');
  document.body.appendChild(temp);

  const qr = new QRCode(temp, {
    text: url || DEFAULT_URL,
    width: 180,
    height: 180,
    colorDark: '#3a2820',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });

  // Wait for QR canvas to render then overlay heart
  setTimeout(() => {
    const qrCanvas = temp.querySelector('canvas');
    if (!qrCanvas) { document.body.removeChild(temp); return; }

    // Create output canvas
    const canvas = document.createElement('canvas');
    canvas.width = 180; canvas.height = 180;
    canvas.style.borderRadius = '8px';
    const ctx = canvas.getContext('2d');

    // Draw QR
    ctx.drawImage(qrCanvas, 0, 0);

    // White circle background for heart
    const cx = 90, cy = 90;
    ctx.beginPath();
    ctx.arc(cx, cy, 26, 0, Math.PI * 2);
    ctx.fillStyle = 'white';
    ctx.fill();

    // Draw large heart centered
    ctx.save();
    ctx.translate(cx, cy);
    ctx.beginPath();
    ctx.moveTo(0, 8);
    ctx.bezierCurveTo(-3, 4, -18, 3, -18, -7);
    ctx.bezierCurveTo(-18, -17, -4, -17, 0, -9);
    ctx.bezierCurveTo(4, -17, 18, -17, 18, -7);
    ctx.bezierCurveTo(18, 3, 3, 4, 0, 8);
    ctx.closePath();
    const grad = ctx.createLinearGradient(-18, -17, 18, 8);
    grad.addColorStop(0, '#c4896f');
    grad.addColorStop(1, '#c9a96e');
    ctx.fillStyle = grad;
    ctx.fill();
    // Small shine
    ctx.beginPath();
    ctx.arc(-6, -8, 3.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fill();
    ctx.restore();

    container.appendChild(canvas);
    document.body.removeChild(temp);
  }, 100);
}

// התחל — טען נתוני אירוע ואז צור QR
loadEvent();
</script>
</body>
</html>
